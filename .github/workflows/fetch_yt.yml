name: Fetch Latest YouTube Video

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch latest video
        run: |
          FEED=$(curl -s "https://www.youtube.com/feeds/videos.xml?channel_id=UC3E22O91eJKspz-Afs5t77Q")
          VIDEO_ID=$(echo "$FEED" | grep -o '<yt:videoId>[^<]*</yt:videoId>' | head -1 | sed 's/<[^>]*>//g')
          VIDEO_TITLE=$(echo "$FEED" | grep -o '<title>[^<]*</title>' | sed -n '2p' | sed 's/<[^>]*>//g')
          echo "{\"id\":\"$VIDEO_ID\",\"title\":\"$VIDEO_TITLE\",\"updated\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > latest_video.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest_video.json
          git diff --staged --quiet || git commit -m "Update latest video"
          git push
